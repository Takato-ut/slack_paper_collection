name: Gene Extraction Bot

on:
  # 毎日 00:00 UTC（09:00 JST）に自動実行
  schedule:
    - cron: "0 0 * * *"

  # GitHub Actions UI から手動実行も可能
  workflow_dispatch:
    inputs:
      dry_run:
        description: "dry-run（Notion に書き込まず抽出内容だけ確認）"
        type: boolean
        default: false

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements_extractor.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements_extractor.txt

      - name: Run gene extractor
        env:
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python scripts/gene_extractor.py --dry-run
          else
            python scripts/gene_extractor.py
          fi

      - name: Notify on failure (Slack)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"text": ":x: *Gene Extraction Bot* が失敗しました。\nGitHub Actions のログを確認してください。\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|ログを開く>"}'
